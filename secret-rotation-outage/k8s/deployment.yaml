apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: payment-service:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: API_TOKEN
