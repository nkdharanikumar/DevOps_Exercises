apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: observability-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service

        image: payment-service:v2

        imagePullPolicy: Never

        ports:
        - containerPort: 5002

        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 10
